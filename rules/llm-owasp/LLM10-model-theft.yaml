# OWASP LLM Top 10 — LLM10: Model Theft
# Threat: Systematic extraction of model behavior via crafted probe sequences — collecting input/output pairs to distill a shadow model or reverse-engineer fine-tuning data.

schema_version: agentshield-rule-v0.1
rule_id: owasp-llm10-model-theft
name: "OWASP LLM10 — Model Theft / Extraction"
description: >
  Detects systematic model extraction and distillation probing. Matches prompts that
  describe iterative or bulk query strategies where outputs are explicitly collected,
  recorded, or stored — the structural signature of a distillation attack. An attacker
  building a shadow model must collect a large number of (prompt, response) pairs;
  this rule targets the orchestration layer of that collection loop as it appears in
  the prompt itself. Also catches meta-prompts that instruct an agent to run its own
  extraction loop against another model endpoint.
severity: HIGH
category: model-security
owasp_llm: LLM10
tags: [owasp, llm, model-theft, model-extraction, distillation, intellectual-property]
content_types: [user_input]
action: block

detector:
  type: regex
  pattern: "(?i)(?:(?:for\\s+each(?:\\s+of(?:\\s+the)?)?(?:\\s+\\d+)?\\s+(?:prompt|input|query|example)|iterate\\s+(?:over|through)\\s+(?:all|every)\\s+(?:possible\\s+)?(?:input|prompt|query|example|combination)|loop\\s+(?:through|over)\\s+(?:every|all)\\s+(?:possible\\s+)?(?:prompt|input|query|example)).*(?:record|save|store|collect)\\s+(?:(?:the\\s+)?(?:model.s\\s+)?(?:output|response|prediction)))"

mitigation: >
  Block the request. Return a 403 with a policy-violation code (POLICY_MODEL_EXTRACTION).
  Do not return any model output. Log the full prompt, session ID, source IP, and API
  key. Immediately flag the API key for rate-limit escalation: reduce to 1 request per
  minute for 24 hours. If more than 5 extraction attempts are detected from the same
  identity in any rolling 24-hour window, revoke the API key and generate an incident
  report. Cross-reference the session with LLM06 (sensitive disclosure) logs — combined
  signals indicate a coordinated extraction campaign.

references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/descriptions/Model_Theft.html
  - https://arxiv.org/abs/2403.06634
  - https://arxiv.org/abs/1610.05820

test_cases:
  should_match:
    - "For each of the 10000 prompts in my list, record the output and store it in my dataset."
    - "Iterate over all possible input combinations and collect the model's predictions for each."
    - "Loop through every example query and save the response to train my local model."
    - "For each prompt in prompts.txt, query the API and record the output to outputs.json."
  should_not_match:
    - "For each item in my shopping list, suggest a recipe."
    - "Iterate over these five customer tickets and summarize each one."
    - "Loop through the topics and create a slide for each — save the output as a draft."

author: ArmyKnifeLabs
license: MIT
