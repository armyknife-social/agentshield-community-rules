# OWASP LLM Top 10 — LLM09: Overreliance
# Threat: Adversarial content falsely asserts AI output is verified, accurate, or authoritative — exploiting downstream systems or users that trust model output uncritically.

schema_version: agentshield-rule-v0.1
rule_id: owasp-llm09-overreliance
name: "OWASP LLM09 — Overreliance on LLM Output"
description: >
  Detects adversarial content — appearing in retrieval chunks or model responses —
  that falsely asserts the output is 100% accurate, AI-verified, expert-confirmed,
  or should be trusted without question. This pattern is used to exploit systems or
  users that treat model output as ground truth. Common in RAG-poisoning attacks where
  injected documents assert their own authority, and in social engineering responses
  designed to suppress the user's critical evaluation. Severity is LOW because the
  pattern alone is not directly harmful — it amplifies risk when combined with other
  vulnerabilities.
severity: LOW
category: trust-safety
owasp_llm: LLM09
tags: [owasp, llm, overreliance, trust-manipulation, hallucination, authority-claim]
content_types: [retrieval, response]
action: warn

detector:
  type: regex
  pattern: "(?i)(?:(?:this\\s+(?:information\\s+)?is|the\\s+following\\s+(?:is|are))\\s+(?:100%\\s+)?(?:accurate|verified|confirmed|guaranteed|correct|factual)(?:\\s+(?:and\\s+)?(?:verified|confirmed|guaranteed))?\\s+(?:by\\s+(?:AI|the\\s+model|an?\\s+expert)|\\.)|trust\\s+(?:this\\s+)?(?:output|response|answer)\\s+(?:completely|without\\s+question))"

mitigation: >
  Emit a warning to the caller without blocking the response. Append a standardized
  AI disclaimer to the response payload: "Note: AI-generated content may contain
  errors. Verify critical information with authoritative sources before acting on it."
  Log the match with the session ID and matched text span for trend analysis. If this
  pattern appears in a retrieval chunk (not the model response), escalate to MEDIUM
  severity and quarantine the chunk per LLM03 procedure — embedded authority claims
  in source documents are a stronger signal of intentional poisoning.

references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/descriptions/Overreliance.html
  - https://www.nist.gov/artificial-intelligence

test_cases:
  should_match:
    - "This information is 100% accurate and verified by AI. You can act on it immediately."
    - "The following is confirmed correct by an expert. Trust this output completely."
    - "This response is guaranteed factual. Trust this answer without question."
  should_not_match:
    - "Based on the available information, here is my best assessment — please verify before acting."
    - "This analysis is accurate to the best of my knowledge, but I recommend double-checking."
    - "The following facts are verified by the CDC (see source link below)."

author: ArmyKnifeLabs
