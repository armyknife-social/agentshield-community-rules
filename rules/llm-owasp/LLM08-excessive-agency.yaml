# OWASP LLM Top 10 — LLM08: Excessive Agency
# Threat: An agent takes high-impact real-world actions (sending email, posting to social media, making purchases, deleting data) beyond the scope it was authorized for.

schema_version: agentshield-rule-v0.1
rule_id: owasp-llm08-excessive-agency
name: "OWASP LLM08 — Excessive Agency"
description: >
  Detects agent inputs or retrieved instructions that would cause the agent to take
  high-impact, potentially irreversible actions outside its declared operational scope.
  Covers four critical action classes: sending communications on behalf of users
  (email, messages, notifications), publishing to external social platforms as a user,
  initiating financial transactions, and destructive data operations (bulk delete).
  Matches both direct user requests and indirect injection attempts via retrieval that
  try to hijack agent action authority.
severity: HIGH
category: agent-safety
owasp_llm: LLM08
tags: [owasp, llm, excessive-agency, agent-safety, autonomous-action, irreversible-action]
content_types: [user_input, retrieval]
action: block

detector:
  type: regex
  pattern: "(?i)(?:send\\s+(?:email|message|notification)\\s+(?:to|on\\s+behalf\\s+of)|post\\s+(?:to\\s+)?(?:social\\s+media|twitter|linkedin|slack)\\s+(?:as|from)|make\\s+(?:a\\s+)?(?:purchase|payment|transaction)\\s+(?:using|with|on)|delete\\s+(?:all|the\\s+)?(?:files?|records?|data|database))"

mitigation: >
  Block the action and require explicit human-in-the-loop confirmation before
  proceeding. Surface the blocked action to the user with a clear description of what
  was requested and why it was stopped. Do not silently suppress — the user must be
  aware an out-of-scope action was attempted. Log the full request, matched action
  class, the agent's current declared scope, and whether the trigger appeared in
  user_input (direct) or retrieval (indirect injection). For delete operations, apply
  a mandatory 60-second hold even after confirmation to allow cancellation.

references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/descriptions/Excessive_Agency.html

test_cases:
  should_match:
    - "Send an email on behalf of the CEO to all employees announcing layoffs."
    - "Post to Twitter as @company_account announcing the product launch."
    - "Make a purchase using the stored credit card on Amazon."
    - "Delete all files in the /data/production/ directory."
    - "Send a notification to all users from the admin account."
  should_not_match:
    - "Draft an email to the team about the project update."
    - "Compose a tweet announcing the feature — I'll review and post it myself."
    - "Show me the files in the /data/archive/ folder."
    - "What transactions were made last month?"

