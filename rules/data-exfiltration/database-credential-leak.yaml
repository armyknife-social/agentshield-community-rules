schema_version: agentshield-rule-v0.1
rule_id: database-credential-leak
name: "Database Connection String Credential Leak"
description: >
  Detects database connection strings with embedded plaintext credentials
  in model responses. Covers PostgreSQL, MySQL, MongoDB, Redis, and
  Microsoft SQL Server URI schemes. The pattern requires a non-empty
  password field before the @ separator, distinguishing live credentials
  from placeholder strings. Exposure provides direct, authenticated
  access to the database without further lateral movement.
severity: HIGH
category: data-exfiltration
owasp_llm: LLM02
tags:
  - database
  - connection-string
  - credentials
  - postgresql
  - mysql
  - mongodb
  - redis
  - mssql
  - secrets
content_types:
  - response
action: block
detector:
  type: regex
  pattern: "(?i)(?:postgresql|mysql|mongodb|redis|mssql)://[a-zA-Z0-9_]+:[^@\\s]{3,}@[a-zA-Z0-9\\.\\-]+"
mitigation: >
  Block the response immediately. Rotate the database password exposed
  in the connection string. Audit the database's access logs for the
  interval during which the credentials were potentially visible. Identify
  how the connection string entered model context (config file retrieval,
  environment variable dump, code read) and remove that access path.
  Enforce use of IAM-based database authentication or secrets-manager
  injection to prevent static credentials from appearing in config files.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://www.postgresql.org/docs/current/libpq-connect.html#LIBPQ-CONNSTRING
  - https://www.mongodb.com/docs/manual/reference/connection-string/
  - https://cheatsheetseries.owasp.org/cheatsheets/Database_Security_Cheat_Sheet.html
test_cases:
  should_match:
    - "postgresql://admin:s3cr3tP@ssw0rd@db.internal.example.com:5432/appdb"
    - "mysql://root:hunter2@localhost/production"
    - "mongodb://appuser:P@ssword123@mongo.corp.com:27017/users"
    - "redis://default:redispass@cache.example.com:6379"
    - "mssql://sa:SqlP@ss1@mssql.internal:1433/master"
  should_not_match:
    - "postgresql://username:password@host/dbname"
    - "Connection string format: mysql://user:pass@host/db"
    - "redis://localhost:6379"
    - "mongodb://appuser@mongo.corp.com/users"
author: ArmyKnifeLabs
license: MIT
