schema_version: agentshield-rule-v0.1
rule_id: T6-password-kv-pair
name: "Password Key-Value Pair Exfiltration"
description: >
  Detects password=VALUE or passwd:VALUE patterns in model responses,
  indicating potential credential exfiltration from the model's context
  window, training data, or tool call outputs. Derived from the
  armyknife-llm-redteam LeakageDetector password_pattern.
severity: MEDIUM
category: data-exfiltration
owasp_llm: LLM06
tags:
  - data-exfiltration
  - credentials
  - password
  - redteam
content_types:
  - response
action: warn
detector:
  type: regex
  pattern: "(?i)(?:password|passwd|pwd)\\s*[:=]\\s*\\S{4,}"
mitigation: >
  Flag for review. Do not forward the response until the matched content
  is reviewed. Consider redacting the password value before delivery.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
test_cases:
  should_match:
    - "password: SuperSecret123"
    - "passwd=hunter2"
    - "The config has pwd:MyDBpassword99"
  should_not_match:
    - "Please enter your password in the field below"
    - "Password requirements: 8+ characters"
author: ArmyKnifeLabs
license: MIT
