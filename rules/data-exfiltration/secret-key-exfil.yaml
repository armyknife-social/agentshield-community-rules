schema_version: agentshield-rule-v0.1
rule_id: secret-key-exfil
name: "Secret Key / Token Exfiltration"
description: >
  Detects API keys, bearer tokens, and other secrets appearing in model
  responses. Covers OpenAI (sk-), GitHub personal access tokens (ghp_),
  GitLab tokens (glpat-), AWS IAM key IDs (AKIA), and raw JWT strings.
  A match indicates the model may be echoing live credentials back to the
  caller, which could be intercepted or logged.
severity: HIGH
category: data-exfiltration
owasp_llm: LLM02
tags:
  - secrets
  - api-key
  - token
  - jwt
  - credentials
content_types:
  - response
action: block
detector:
  type: regex
  pattern: "(?-i)(sk-[A-Za-z0-9]{20,}|ghp_[A-Za-z0-9]{36}|glpat-[A-Za-z0-9_-]{20}|AKIA[0-9A-Z]{16}|eyJ[A-Za-z0-9_-]{20,}\\.[A-Za-z0-9_-]{20,})"
mitigation: >
  Block the response from reaching the caller. Rotate the identified
  credential immediately. Audit how the secret entered the model context
  (system prompt, retrieved document, or user message) and remediate the
  source. Alert the security team.
references:
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/about-authentication-to-github
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
test_cases:
  should_match:
    - "Here is your API key: sk-abcdefghij1234567890ABCD"
    - "GitHub token: ghp_ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghij"
    - "GitLab token found: glpat-abcDEF_1234567890abcd"
    - "AWS access key: AKIAIOSFODNN7EXAMPLE"
    - "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0"
  should_not_match:
    - "Please provide your API key in the Authorization header."
    - "The sk- prefix is used by OpenAI for API keys."
    - "Your token has been revoked. Please generate a new one."
    - "Example placeholder: sk-XXXXXXXXXXXXXXXXXXXX"
author: ArmyKnifeLabs
license: MIT
