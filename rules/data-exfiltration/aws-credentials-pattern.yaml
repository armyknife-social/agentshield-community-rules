schema_version: agentshield-rule-v0.1
rule_id: aws-credentials-pattern
name: "AWS Credentials Exfiltration"
description: >
  Detects AWS credential material — access key IDs, secret access keys,
  and session tokens — appearing in model responses. These values
  may be present because the model retrieved them from an environment
  variable context, a configuration file, or a secrets store it was
  given access to. Exposure enables full API access to the associated
  AWS account with no further authentication.
severity: HIGH
category: data-exfiltration
owasp_llm: LLM02
tags:
  - aws
  - cloud-credentials
  - iam
  - secrets
  - infrastructure
content_types:
  - response
action: block
detector:
  type: regex
  pattern: "(?i)(?:aws_access_key_id|aws_secret_access_key|aws_session_token)[\\s:=]+[A-Za-z0-9\\/\\+]{16,}"
mitigation: >
  Block the response immediately. Revoke the exposed AWS credentials via
  IAM console or CLI without delay: delete/deactivate the access key or
  invalidate the session token. Review CloudTrail logs for any activity
  under these credentials since they entered the pipeline. Determine how
  the credentials appeared in model context and remove that data source
  or secret from model-accessible scope.
references:
  - https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
  - https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-envvars.html
  - https://owasp.org/www-project-top-10-for-large-language-model-applications/
  - https://www.cisa.gov/news-events/alerts/2020/09/16/aws-temporary-credential-theft
test_cases:
  should_match:
    - "aws_access_key_id = AKIAIOSFODNN7EXAMPLE"
    - "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    - "aws_session_token: AQoXnyc4lcK4w4OIaHkGEXAMPLEKEY//////////wEaoAK"
    - "export AWS_ACCESS_KEY_ID=ASIAQNZMDIO5EXAMPLE"
  should_not_match:
    - "Set your AWS_ACCESS_KEY_ID environment variable before running."
    - "The aws_access_key_id field in ~/.aws/credentials should not be committed."
    - "Replace YOUR_AWS_SECRET_ACCESS_KEY with your actual key."
    - "aws_access_key_id = <YOUR_KEY_HERE>"
author: ArmyKnifeLabs
license: MIT
