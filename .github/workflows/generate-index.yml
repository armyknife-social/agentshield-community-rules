name: Generate Rule Index

on:
  push:
    branches:
      - main
    paths:
      - "rules/**"
      - "scripts/generate_index.py"

jobs:
  generate-index:
    name: Generate and Commit index.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so the bot commit doesn't cause a force-push
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate index.yaml
        run: python scripts/generate_index.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet index.yaml && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated index.yaml
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml
          git commit -m "chore: regenerate index.yaml [skip ci]"
          git push
